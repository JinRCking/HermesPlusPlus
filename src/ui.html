<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermes++</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:210px;
  --sidebar-bg:#1a1a2e;
  --sidebar-hover:#2a2a45;
  --sidebar-active:#0f3460;
  --accent:#4f8ef7;
  --accent2:#6c63ff;
  --bg:#f2f2f7;
  --card:#ffffff;
  --border:#e5e5ea;
  --text:#1c1c1e;
  --text2:#6c6c70;
  --text3:#aeaeb2;
  --green:#34c759;
  --red:#ff3b30;
  --orange:#ff9500;
  --topbar-h:52px;
  --radius:12px;
  --shadow:0 1px 4px rgba(0,0,0,.10);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:var(--text);background:var(--bg)}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1}
.content{flex:1;overflow-y:auto;padding:20px}

/* Sidebar */
.sidebar-logo{padding:18px 16px 10px;display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:15px;letter-spacing:.3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:#c4ccdf;cursor:pointer;transition:background .15s,color .15s;font-size:13.5px;user-select:none}
.nav-item:hover{background:var(--sidebar-hover);color:#e8ecf5}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-spacer{flex:1}
.sidebar-footer{padding:12px 16px;border-top:1px solid #2a2a45;font-size:12px;color:#6b7a9a}

/* Topbar buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-launch{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:600}
.btn-launch:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-danger{background:#ff3b30;color:#fff}
.btn-danger:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* Health grid */
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.health-item{background:var(--bg);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.health-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.health-dot.ok{background:var(--green)}
.health-dot.warn{background:var(--orange)}
.health-dot.err{background:var(--red)}
.health-label{font-size:12px;font-weight:600;color:var(--text)}
.health-val{font-size:11px;color:var(--text2);margin-top:1px}

/* Proxy status bar */
.proxy-bar{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.proxy-dot{width:9px;height:9px;border-radius:50%}
.proxy-dot.running{background:var(--green);box-shadow:0 0 0 3px rgba(52,199,89,.2)}
.proxy-dot.stopped{background:var(--red)}
.proxy-url{font-family:monospace;font-size:12px;color:var(--accent);margin-left:2px}

/* Provider list */
.provider-list{list-style:none}
.provider-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;transition:background .1s}
.provider-item:last-child{border-bottom:none}
.provider-item:hover{background:#f9f9fb}
.provider-avatar{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.provider-info{flex:1;min-width:0}
.provider-name{font-weight:600;font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.provider-url{font-size:11.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.badge-active{background:#d1f0dc;color:#1a7a3c}
.badge-inactive{background:var(--bg);color:var(--text3)}

/* Detail view */
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.back-btn{color:var(--accent);cursor:pointer;font-size:13.5px;font-weight:500}
.back-btn:hover{text-decoration:underline}
.detail-title{font-size:17px;font-weight:700;color:var(--text);flex:1}

/* Form */
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=url],input[type=password],textarea,select{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13.5px;color:var(--text);background:var(--card);outline:none;transition:border .15s;font-family:inherit
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{min-height:90px;resize:vertical;font-family:monospace;font-size:12.5px}
.row{display:flex;gap:12px}
.row>.form-group{flex:1}

/* Protocol toggle */
.proto-toggle{display:inline-flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.proto-toggle button{padding:6px 14px;border:none;font-size:12.5px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:background .15s,color .15s}
.proto-toggle button.active{background:var(--accent);color:#fff}

/* Toast */
#toast{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:9px 15px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;max-width:320px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(50px);opacity:0}to{transform:none;opacity:1}}
.toast-item.success{background:#1c1c1e;color:#fff}
.toast-item.error{background:#ff3b30;color:#fff}
.toast-item.info{background:var(--accent);color:#fff}

/* Empty */
.empty{text-align:center;padding:44px 24px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}

/* Misc */
.mono{font-family:monospace;font-size:12px;background:#f0f0f5;padding:2px 6px;border-radius:4px}
pre.code{background:#f0f0f5;padding:10px 14px;border-radius:8px;font-size:12.5px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#4f8ef7" opacity=".25"/>
        <path d="M8 12l2.5 2.5L16 9" stroke="#4f8ef7" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Hermes++
    </div>
    <div class="nav-item active" id="nav-overview" onclick="navigate('overview')">
      <span class="nav-icon">◈</span> 概览
    </div>
    <div class="nav-item" id="nav-providers" onclick="navigate('providers')">
      <span class="nav-icon">⛓</span> 供应商配置
    </div>
    <div class="nav-item" id="nav-proxy" onclick="navigate('proxy')">
      <span class="nav-icon">⇄</span> 代理服务
    </div>
    <div class="nav-item" id="nav-settings" onclick="navigate('settings')">
      <span class="nav-icon">⚙</span> 设置
    </div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">端口 57421 · 57422</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">概览</div>
      <button class="btn btn-ghost" style="font-size:16px;padding:6px 10px" onclick="refreshPage()" title="刷新">↺</button>
      <button class="btn btn-launch" id="btn-launch" onclick="launchHermes()">▶ 启动 Hermes</button>
    </header>
    <div class="content" id="content">
      <div class="empty"><div class="empty-icon">⏳</div><div>加载中...</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── State ──
let currentPage = 'overview';
let settings = null;
let proxyRunning = false;
let hermesOk = false;
let editingProvider = null;

// ── API helper ──
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type': 'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api/' + path, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({error: r.statusText}));
    throw new Error(e.error || r.statusText);
  }
  return r.json();
}

// ── Toast ──
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.textContent = msg;
  const container = document.getElementById('toast');
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3200);
}

// ── HTML escape ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtProto(p) {
  return ({chatCompletions:'Chat Completions',responses:'Responses API',anthropicMessages:'Anthropic Messages'})[p] || 'Chat Completions';
}

// ── Load data ──
async function loadAll() {
  const [s, ps, hc] = await Promise.allSettled([
    api('GET', 'settings'),
    api('GET', 'proxy/status'),
    api('GET', 'hermes/check'),
  ]);
  if (s.status === 'fulfilled') settings = s.value;
  if (ps.status === 'fulfilled') proxyRunning = ps.value.running;
  if (hc.status === 'fulfilled') hermesOk = hc.value.exists;
}

// ── Navigation ──
const PAGE_TITLES = {overview:'概览',providers:'供应商配置',proxy:'代理服务',settings:'设置'};

function navigate(page) {
  currentPage = page;
  editingProvider = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  renderPage();
}

function refreshPage() { loadAll().then(renderPage); }

function renderPage() {
  if (currentPage === 'overview') renderOverview();
  else if (currentPage === 'providers') { if (editingProvider) renderProviderDetail(); else renderProviderList(); }
  else if (currentPage === 'proxy') renderProxy();
  else if (currentPage === 'settings') renderSettings();
}

// ── Overview ──
function renderOverview() {
  const active = (settings?.providerProfiles||[]).find(p => p.id === settings?.activeProviderId);
  const port = settings?.proxyPort || 57421;

  const checks = [
    { label:'代理服务', val: proxyRunning ? `运行中 · 端口 ${port}` : '未启动', st: proxyRunning ? 'ok' : 'err' },
    { label:'活跃供应商', val: active ? active.name : '未设置', st: active ? 'ok' : 'warn' },
    { label:'Hermes 路径', val: hermesOk ? '已配置' : (settings?.hermesPath ? '路径无效' : '未配置'), st: hermesOk ? 'ok' : 'warn' },
    { label:'供应商数量', val: `${(settings?.providerProfiles||[]).length} 个`, st: (settings?.providerProfiles||[]).length > 0 ? 'ok' : 'warn' },
  ];

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">系统状态</div><div class="card-sub">各组件健康检查</div></div>
        <button class="btn btn-outline btn-sm" onclick="refreshPage()">↺ 刷新</button>
      </div>
      <div class="health-grid">
        ${checks.map(c => `<div class="health-item">
          <div class="health-dot ${c.st}"></div>
          <div><div class="health-label">${c.label}</div><div class="health-val">${c.val}</div></div>
        </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">快速操作</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn ${proxyRunning?'btn-danger':'btn-primary'}" onclick="toggleProxy()">
          ${proxyRunning ? '■ 停止代理' : '▶ 启动代理'}
        </button>
        <button class="btn btn-launch" onclick="launchHermes()">▶ 启动 Hermes</button>
        <button class="btn btn-outline" onclick="navigate('providers')">+ 添加供应商</button>
      </div>
      ${proxyRunning ? `<div style="margin-top:12px;font-size:12px;color:var(--text2)">
        代理地址：<span class="mono">http://127.0.0.1:${port}/v1</span>
        &nbsp;·&nbsp;<span class="mono">ANTHROPIC_BASE_URL=http://127.0.0.1:${port}/v1</span>
      </div>` : ''}
    </div>

    ${active ? `<div class="card">
      <div class="card-header">
        <div class="card-title">当前活跃供应商</div>
        <button class="btn btn-outline btn-sm" onclick="navigate('providers');setTimeout(()=>openProvider('${esc(active.id)}'),50)">编辑</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;font-size:13px">
        <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">名称</div><b>${esc(active.name)}</b></div>
        <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">协议</div><b>${fmtProto(active.protocol)}</b></div>
        <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Base URL</div><span class="mono" style="word-break:break-all">${esc(active.baseUrl||'—')}</span></div>
        <div><div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">默认模型</div><span class="mono">${esc(active.model||'—')}</span></div>
      </div>
    </div>` : ''}
  `;
}

// ── Provider list ──
function renderProviderList() {
  document.getElementById('topbar-title').textContent = '供应商配置';
  const providers = settings?.providerProfiles || [];
  const activeId = settings?.activeProviderId || '';

  const listHtml = providers.length === 0
    ? `<div class="empty"><div class="empty-icon">⛓</div><div class="empty-title">暂无供应商</div><div style="font-size:13px">点击右上角添加第一个 API 供应商</div></div>`
    : `<ul class="provider-list">${providers.map(p => `
      <li class="provider-item" onclick="openProvider('${esc(p.id)}')">
        <div class="provider-avatar">${esc(p.name||'?').charAt(0).toUpperCase()}</div>
        <div class="provider-info">
          <div class="provider-name">${esc(p.name)}</div>
          <div class="provider-url">${esc(p.baseUrl||'未设置 Base URL')}</div>
        </div>
        <span class="badge ${p.id === activeId ? 'badge-active' : 'badge-inactive'}">${p.id === activeId ? '使用中' : '未激活'}</span>
        <span style="color:var(--text3);font-size:18px">›</span>
      </li>`).join('')}</ul>`;

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">供应商列表</div><div class="card-sub">${providers.length} 个供应商配置；点击进入详情编辑</div></div>
        <button class="btn btn-primary btn-sm" onclick="openProvider(null)">+ 添加供应商</button>
      </div>
      ${listHtml}
    </div>
  `;
}

// ── Provider detail ──
function openProvider(id) {
  if (id === null) {
    editingProvider = { id: 'new-' + Date.now(), name: '', baseUrl: '', apiKey: '', protocol: 'chatCompletions', model: '', modelList: '', userAgent: '' };
  } else {
    const found = (settings?.providerProfiles||[]).find(p => p.id === id);
    if (!found) return;
    editingProvider = JSON.parse(JSON.stringify(found));
  }
  currentPage = 'providers';
  renderProviderDetail();
}

function renderProviderDetail() {
  const p = editingProvider;
  const isNew = !(settings?.providerProfiles||[]).find(x => x.id === p.id);
  const isActive = p.id === settings?.activeProviderId;
  const proto = p.protocol || 'chatCompletions';

  document.getElementById('topbar-title').textContent = isNew ? '新建供应商' : p.name;
  document.getElementById('content').innerHTML = `
    <div class="detail-header">
      <span class="back-btn" onclick="editingProvider=null;renderProviderList()">← 返回列表</span>
      <span class="detail-title">${isNew ? '新建供应商' : esc(p.name)}</span>
      ${isActive ? '<span class="badge badge-active">使用中</span>' : ''}
      ${!isNew && !isActive ? `<button class="btn btn-outline btn-sm" onclick="activateProvider('${esc(p.id)}')">设为使用</button>` : ''}
      <div style="flex:1"></div>
      ${!isNew ? `<button class="btn btn-danger btn-sm" onclick="deleteProvider('${esc(p.id)}')">删除</button>` : ''}
      <button class="btn btn-primary btn-sm" onclick="saveProvider()">💾 保存</button>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:14px">基本信息</div>
      <div class="form-group">
        <label>供应商名称</label>
        <input type="text" id="p-name" value="${esc(p.name)}" placeholder="如：CPA · Fireworks · OpenRouter">
      </div>
      <div class="form-group">
        <label>Base URL</label>
        <input type="url" id="p-url" value="${esc(p.baseUrl||'')}" placeholder="https://api.example.com/v1">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="p-key" value="${esc(p.apiKey||'')}" placeholder="sk-...">
      </div>
      <div class="row">
        <div class="form-group">
          <label>默认模型</label>
          <input type="text" id="p-model" value="${esc(p.model||'')}" placeholder="留空则不指定">
        </div>
        <div class="form-group">
          <label>User-Agent</label>
          <input type="text" id="p-ua" value="${esc(p.userAgent||'')}" placeholder="留空则使用默认">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:12px">上游协议</div>
      <label>代理转发协议</label>
      <div class="proto-toggle" id="proto-toggle">
        <button class="${proto==='chatCompletions'?'active':''}" onclick="setProto('chatCompletions')">Chat Completions</button>
        <button class="${proto==='responses'?'active':''}" onclick="setProto('responses')">Responses API</button>
        <button class="${proto==='anthropicMessages'?'active':''}" onclick="setProto('anthropicMessages')">Anthropic Messages</button>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--text2)">
        ${proto==='chatCompletions' ? '转发至 /chat/completions（OpenAI 兼容）' :
          proto==='responses' ? '转发至 /responses（OpenAI Responses API）' :
          '转发至 /messages（Anthropic 原生格式）'}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">模型列表</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="testProvider()">🔗 测试连接</button>
          <button class="btn btn-primary btn-sm" id="btn-fetch-models" onclick="fetchModels()">⬇ 从上游获取</button>
        </div>
      </div>
      <div class="form-group">
        <label>已配置模型（每行一个，或逗号分隔）</label>
        <textarea id="p-models" placeholder="留空则代理自动转发上游的 /models 响应">${esc(p.modelList||'')}</textarea>
      </div>
      <div id="test-result" style="display:none;font-size:12.5px;margin-top:4px"></div>
    </div>
  `;
}

function setProto(val) {
  if (editingProvider) editingProvider.protocol = val;
  renderProviderDetail();
}

async function saveProvider() {
  if (!editingProvider) return;
  editingProvider.name = document.getElementById('p-name')?.value?.trim() || '';
  editingProvider.baseUrl = document.getElementById('p-url')?.value?.trim() || '';
  editingProvider.apiKey = document.getElementById('p-key')?.value?.trim() || '';
  editingProvider.model = document.getElementById('p-model')?.value?.trim() || '';
  editingProvider.userAgent = document.getElementById('p-ua')?.value?.trim() || '';
  editingProvider.modelList = document.getElementById('p-models')?.value?.trim() || '';

  if (!editingProvider.name) { toast('请填写供应商名称', 'error'); return; }

  try {
    await api('POST', 'providers', editingProvider);
    await loadAll();
    toast('保存成功');
    editingProvider = null;
    renderProviderList();
  } catch(e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

async function activateProvider(id) {
  try {
    await api('POST', 'providers/' + id + '/activate');
    await loadAll();
    toast('已切换供应商');
    renderProviderDetail();
  } catch(e) {
    toast('切换失败: ' + e.message, 'error');
  }
}

async function deleteProvider(id) {
  if (!confirm('确认删除此供应商？')) return;
  try {
    await api('DELETE', 'providers/' + id);
    await loadAll();
    toast('已删除');
    editingProvider = null;
    renderProviderList();
  } catch(e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

async function testProvider() {
  if (!editingProvider) return;
  editingProvider.baseUrl = document.getElementById('p-url')?.value?.trim() || editingProvider.baseUrl;
  editingProvider.apiKey = document.getElementById('p-key')?.value?.trim() || editingProvider.apiKey;
  await api('POST', 'providers', editingProvider).catch(()=>{});

  const res = document.getElementById('test-result');
  if (!res) return;
  res.style.display = 'block';
  res.innerHTML = '<span style="color:var(--text2)">测试中...</span>';

  try {
    const r = await api('GET', 'providers/' + editingProvider.id + '/test');
    if (r.error) res.innerHTML = `<span style="color:var(--red)">✗ ${esc(r.error)}</span>`;
    else res.innerHTML = `<span style="color:var(--green)">✓ HTTP ${r.httpStatus} · ${esc(r.endpoint)}</span>`;
  } catch(e) {
    res.innerHTML = `<span style="color:var(--red)">✗ ${esc(e.message)}</span>`;
  }
}

async function fetchModels() {
  if (!editingProvider) return;
  editingProvider.baseUrl = document.getElementById('p-url')?.value?.trim() || editingProvider.baseUrl;
  editingProvider.apiKey = document.getElementById('p-key')?.value?.trim() || editingProvider.apiKey;
  await api('POST', 'providers', editingProvider).catch(()=>{});

  const btn = document.getElementById('btn-fetch-models');
  if (btn) { btn.textContent = '获取中...'; btn.disabled = true; }
  try {
    const r = await api('POST', 'providers/' + editingProvider.id + '/fetch-models');
    if (r.error) { toast('获取失败: ' + r.error, 'error'); }
    else {
      const ta = document.getElementById('p-models');
      if (ta) ta.value = r.models.join('\n');
      editingProvider.modelList = r.models.join('\n');
      toast('获取到 ' + r.models.length + ' 个模型');
    }
  } catch(e) {
    toast('获取失败: ' + e.message, 'error');
  } finally {
    if (btn) { btn.textContent = '⬇ 从上游获取'; btn.disabled = false; }
  }
}

// ── Proxy page ──
function renderProxy() {
  const port = settings?.proxyPort || 57421;
  const url = 'http://127.0.0.1:' + port + '/v1';
  document.getElementById('content').innerHTML = `
    <div class="proxy-bar">
      <div class="proxy-dot ${proxyRunning?'running':'stopped'}"></div>
      <span style="font-weight:600">${proxyRunning ? '代理运行中' : '代理已停止'}</span>
      ${proxyRunning ? `<span class="proxy-url">${url}</span>` : ''}
      <div style="flex:1"></div>
      <button class="btn ${proxyRunning?'btn-danger':'btn-primary'} btn-sm" onclick="toggleProxy()">
        ${proxyRunning ? '■ 停止代理' : '▶ 启动代理'}
      </button>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:12px">端口设置</div>
      <div class="form-group">
        <label>监听端口</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="proxy-port-input" value="${port}" style="max-width:120px">
          <button class="btn btn-outline btn-sm" onclick="saveProxyPort()">保存</button>
        </div>
        <div style="margin-top:6px;font-size:12px;color:var(--text2)">修改端口后需重启代理生效</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:12px">使用方法</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.9">
        <p>启动代理后设置以下环境变量：</p>
        <pre class="code" style="margin:8px 0">ANTHROPIC_BASE_URL=${url}</pre>
        <p>OpenAI 兼容客户端：</p>
        <pre class="code" style="margin:8px 0">OPENAI_BASE_URL=${url}
OPENAI_API_KEY=any</pre>
        <p>测试代理（在命令行）：</p>
        <pre class="code" style="margin:8px 0">curl ${url}/models</pre>
      </div>
    </div>
  `;
}

async function saveProxyPort() {
  const val = parseInt(document.getElementById('proxy-port-input')?.value || '');
  if (!val || val < 1024 || val > 65535) { toast('端口无效（1024–65535）', 'error'); return; }
  try {
    await api('PUT', 'settings', {...settings, proxyPort: val});
    await loadAll();
    toast('端口已保存，重启代理后生效');
    renderProxy();
  } catch(e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

// ── Settings page ──
function renderSettings() {
  const hermes = settings?.hermesPath || '';
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Hermes 配置</div>
      <div class="form-group">
        <label>Hermes 可执行文件路径</label>
        <input type="text" id="hermes-path" value="${esc(hermes)}" placeholder="C:\\Users\\...\\Hermes.exe">
        <div style="margin-top:6px;font-size:12px;color:var(--text2)">配置后右上角"启动 Hermes"按钮将直接打开应用，并自动注入代理环境变量</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveHermesPath()">保存</button>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:12px">关于 Hermes++</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.9">
        <p>Hermes++ 是本地代理工具，让 Hermes / Claude Code 能自由切换 API 供应商。</p>
        <p style="margin-top:6px">管理端口：<span class="mono">57422</span> &nbsp; 代理端口：<span class="mono">${settings?.proxyPort||57421}</span></p>
        <p style="margin-top:6px">设置文件：<span class="mono">%APPDATA%\\hermes-plus\\settings.json</span></p>
      </div>
    </div>
  `;
}

async function saveHermesPath() {
  const path = document.getElementById('hermes-path')?.value?.trim() || '';
  try {
    await api('PUT', 'settings', {...settings, hermesPath: path});
    await loadAll();
    toast('保存成功');
  } catch(e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

// ── Proxy control ──
async function toggleProxy() {
  try {
    if (proxyRunning) {
      await api('POST', 'proxy/stop');
      proxyRunning = false;
      toast('代理已停止');
    } else {
      const r = await api('POST', 'proxy/start');
      if (r.error) { toast('启动失败: ' + r.error, 'error'); return; }
      // Brief delay then verify actual status
      await new Promise(res => setTimeout(res, 450));
      const status = await api('GET', 'proxy/status');
      proxyRunning = status.running;
      if (proxyRunning) toast('代理已启动 · 端口 ' + status.port);
      else toast('代理启动失败，请查看控制台日志', 'error');
    }
    renderPage();
  } catch(e) {
    toast('操作失败: ' + e.message, 'error');
  }
}

// ── Launch Hermes ──
async function launchHermes() {
  if (!proxyRunning) {
    toast('请先启动代理服务', 'error');
    return;
  }
  try {
    const r = await api('POST', 'hermes/launch');
    if (r.error) toast(r.error, 'error');
    else toast('Hermes 已启动');
  } catch(e) {
    toast('启动失败: ' + e.message, 'error');
  }
}

// ── Auto-poll proxy status ──
setInterval(async () => {
  try {
    const s = await api('GET', 'proxy/status');
    if (s.running !== proxyRunning) { proxyRunning = s.running; renderPage(); }
  } catch(_) {}
}, 5000);

// ── Boot ──
(async () => { await loadAll(); navigate('overview'); })();
</script>
</body>
</html>
